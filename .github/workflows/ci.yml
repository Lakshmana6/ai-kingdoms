name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ai_kingdoms
          POSTGRES_PASSWORD: kingdoms_secret
          POSTGRES_DB: ai_kingdoms_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U ai_kingdoms"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build --workspaces --if-present
      - run: npm run test --workspaces --if-present
