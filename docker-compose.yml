version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ai_kingdoms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ai_kingdoms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kingdoms_secret}
      POSTGRES_DB: ${POSTGRES_DB:-ai_kingdoms_db}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-ai_kingdoms}']  
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ai_kingdoms_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: ai_kingdoms_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${POSTGRES_USER:-ai_kingdoms}:${POSTGRES_PASSWORD:-kingdoms_secret}@postgres:5432/${POSTGRES_DB:-ai_kingdoms_db}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PORT: 3000
      SIM_TICK_MS: ${SIM_TICK_MS:-1000}
      SIM_AI_COUNT: ${SIM_AI_COUNT:-1000}
      SIM_MAX_AI: ${SIM_MAX_AI:-10000}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@ai-kingdoms.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
    ports:
      - '3000:3000'
    volumes:
      - ./apps/backend:/app
      - /app/node_modules
    command: npm run start:dev

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: ai_kingdoms_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:3000
      VITE_WS_URL: ws://localhost:3000
    ports:
      - '5173:5173'
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data:
  redis_data:
